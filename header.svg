<svg width="850" height="270" viewBox="0 0 850 270" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="saitarrun terminal">
  <style>
    .txt    { font-family: ui-monospace, 'Cascadia Code', 'Fira Code', Consolas, 'Courier New', monospace; }
    .prompt { fill: #22d3ee; font-size: 15px; }
    .cmd    { fill: #e6edf3; font-size: 15px; }
    .out    { fill: #00ff9c; font-size: 15px; }
    .dim    { fill: #7d8590; font-size: 12px; }
    .tiny   { fill: #7d8590; font-size: 11px; letter-spacing: 1px; }
    .name   { fill: #e6edf3; font-size: 34px; font-weight: 700; letter-spacing: 3px; }
    .ghostR { fill: #ff2d55; font-size: 34px; font-weight: 700; letter-spacing: 3px; }
    .ghostC { fill: #00e5ff; font-size: 34px; font-weight: 700; letter-spacing: 3px; }

    /* ---- typewriter reveals (clip rects grow in character steps) ---- */
    #c1 rect { animation: w1 1.1s steps(25, end) 0.4s forwards; }
    #c2 rect { animation: w2 0.7s steps(16, end) 1.9s forwards; }
    #c3 rect { animation: w3 1.2s steps(31, end) 3.0s forwards; }
    #c4 rect { animation: w4 1.0s steps(29, end) 4.5s forwards; }
    #c5 rect { animation: w5 0.7s steps(19, end) 5.8s forwards; }
    @keyframes w1 { to { width: 240px; } }
    @keyframes w2 { to { width: 420px; } }
    @keyframes w3 { to { width: 300px; } }
    @keyframes w4 { to { width: 290px; } }
    @keyframes w5 { to { width: 190px; } }

    /* ---- blinking block cursor (starts after last prompt types) ---- */
    .cursor { opacity: 0; animation: blink 1.1s steps(1, end) 6.6s infinite; }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

    /* ---- glitch: chromatic ghost layers flash on the name, forever ---- */
    .gA { opacity: 0; animation: glA 3.6s steps(1, end) 2.8s infinite; }
    .gB { opacity: 0; animation: glB 3.6s steps(1, end) 2.8s infinite; }
    @keyframes glA {
      0%, 100% { opacity: 0; transform: translate(0, 0); }
      6%  { opacity: 0.8; transform: translate(-3px, 0); }
      9%  { opacity: 0;   transform: translate(0, 0); }
      55% { opacity: 0.9; transform: translate(-2px, 1px); }
      58% { opacity: 0;   transform: translate(0, 0); }
    }
    @keyframes glB {
      0%, 100% { opacity: 0; transform: translate(0, 0); }
      6%  { opacity: 0.8; transform: translate(3px, 0); }
      9%  { opacity: 0;   transform: translate(0, 0); }
      55% { opacity: 0.9; transform: translate(2px, -1px); }
      58% { opacity: 0;   transform: translate(0, 0); }
    }

    /* ---- matrix rain columns ---- */
    .rain { fill: #00ff9c; font-size: 13px; opacity: 0.07; }
    @keyframes fall { from { transform: translateY(-330px); } to { transform: translateY(290px); } }
    .r1 { animation: fall 7.0s  linear -1.0s infinite; }
    .r2 { animation: fall 9.5s  linear -4.0s infinite; }
    .r3 { animation: fall 6.2s  linear -2.5s infinite; }
    .r4 { animation: fall 11.0s linear -6.0s infinite; }
    .r5 { animation: fall 8.0s  linear -0.5s infinite; }
    .r6 { animation: fall 6.8s  linear -5.0s infinite; }
    .r7 { animation: fall 10.2s linear -3.0s infinite; }
    .r8 { animation: fall 7.6s  linear -6.5s infinite; }
    .r9 { animation: fall 9.0s  linear -1.8s infinite; }

    /* ---- CRT scan band sweeping down ---- */
    .band { animation: sweep 5s linear infinite; opacity: 0.07; }
    @keyframes sweep { from { transform: translateY(-70px); } to { transform: translateY(290px); } }

    /* ---- live status dot ---- */
    .pulse { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }

    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01s !important; animation-delay: 0s !important; animation-iteration-count: 1 !important; }
    }
  </style>

  <defs>
    <clipPath id="c1"><rect x="30" y="62"  width="0" height="24"/></clipPath>
    <clipPath id="c2"><rect x="30" y="92"  width="0" height="46"/></clipPath>
    <clipPath id="c3"><rect x="30" y="146" width="0" height="24"/></clipPath>
    <clipPath id="c4"><rect x="30" y="176" width="0" height="24"/></clipPath>
    <clipPath id="c5"><rect x="30" y="210" width="0" height="24"/></clipPath>
    <clipPath id="body"><rect x="1" y="37" width="848" height="232"/></clipPath>

    <linearGradient id="bandGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#00ff9c" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00ff9c" stop-opacity="1"/>
      <stop offset="1"   stop-color="#00ff9c" stop-opacity="0"/>
    </linearGradient>

    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#00ff9c" opacity="0.04"/>
    </pattern>

  </defs>

  <!-- frame -->
  <rect x="1" y="1" width="848" height="268" rx="12" fill="#0a0f14" stroke="#00ff9c" stroke-opacity="0.28" stroke-width="1.5"/>

  <!-- matrix rain (behind everything inside body) -->
  <g clip-path="url(#body)">
    <g transform="translate(65,0)"><text class="txt rain r1"><tspan x="0" dy="14">0</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">ｱ</tspan><tspan x="0" dy="16">7</tspan><tspan x="0" dy="16">ﾊ</tspan><tspan x="0" dy="16">3</tspan><tspan x="0" dy="16">ｼ</tspan><tspan x="0" dy="16">F</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">ﾂ</tspan><tspan x="0" dy="16">9</tspan><tspan x="0" dy="16">ｸ</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">A</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">ﾘ</tspan><tspan x="0" dy="16">5</tspan><tspan x="0" dy="16">E</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">ﾒ</tspan></text></g>
    <g transform="translate(160,0)"><text class="txt rain r2"><tspan x="0" dy="14">ﾈ</tspan><tspan x="0" dy="16">4</tspan><tspan x="0" dy="16">C</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">ｦ</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">8</tspan><tspan x="0" dy="16">ﾅ</tspan><tspan x="0" dy="16">D</tspan><tspan x="0" dy="16">2</tspan><tspan x="0" dy="16">ｳ</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">B</tspan><tspan x="0" dy="16">7</tspan><tspan x="0" dy="16">ﾓ</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">6</tspan><tspan x="0" dy="16">ｹ</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">F</tspan></text></g>
    <g transform="translate(255,0)"><text class="txt rain r3"><tspan x="0" dy="14">1</tspan><tspan x="0" dy="16">ﾀ</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">E</tspan><tspan x="0" dy="16">5</tspan><tspan x="0" dy="16">ｿ</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">9</tspan><tspan x="0" dy="16">ﾕ</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">C</tspan><tspan x="0" dy="16">3</tspan><tspan x="0" dy="16">ｾ</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">7</tspan><tspan x="0" dy="16">ﾎ</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">A</tspan><tspan x="0" dy="16">2</tspan><tspan x="0" dy="16">ｷ</tspan></text></g>
    <g transform="translate(345,0)"><text class="txt rain r4"><tspan x="0" dy="14">ﾐ</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">6</tspan><tspan x="0" dy="16">ﾑ</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">D</tspan><tspan x="0" dy="16">4</tspan><tspan x="0" dy="16">ｵ</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">8</tspan><tspan x="0" dy="16">ﾋ</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">F</tspan><tspan x="0" dy="16">5</tspan><tspan x="0" dy="16">ｻ</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">9</tspan><tspan x="0" dy="16">ﾜ</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">3</tspan></text></g>
    <g transform="translate(440,0)"><text class="txt rain r5"><tspan x="0" dy="14">7</tspan><tspan x="0" dy="16">ｲ</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">B</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">ﾃ</tspan><tspan x="0" dy="16">6</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">ﾇ</tspan><tspan x="0" dy="16">E</tspan><tspan x="0" dy="16">2</tspan><tspan x="0" dy="16">ｺ</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">5</tspan><tspan x="0" dy="16">ﾔ</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">C</tspan><tspan x="0" dy="16">8</tspan><tspan x="0" dy="16">ｽ</tspan><tspan x="0" dy="16">1</tspan></text></g>
    <g transform="translate(535,0)"><text class="txt rain r6"><tspan x="0" dy="14">0</tspan><tspan x="0" dy="16">ﾉ</tspan><tspan x="0" dy="16">9</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">ｴ</tspan><tspan x="0" dy="16">A</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">4</tspan><tspan x="0" dy="16">ﾍ</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">D</tspan><tspan x="0" dy="16">7</tspan><tspan x="0" dy="16">ｶ</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">2</tspan><tspan x="0" dy="16">ﾙ</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">F</tspan><tspan x="0" dy="16">6</tspan><tspan x="0" dy="16">ﾏ</tspan></text></g>
    <g transform="translate(630,0)"><text class="txt rain r7"><tspan x="0" dy="14">ﾁ</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">5</tspan><tspan x="0" dy="16">ｹ</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">E</tspan><tspan x="0" dy="16">3</tspan><tspan x="0" dy="16">ﾗ</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">8</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">ｸ</tspan><tspan x="0" dy="16">B</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">ﾆ</tspan><tspan x="0" dy="16">6</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">9</tspan><tspan x="0" dy="16">ｼ</tspan><tspan x="0" dy="16">2</tspan></text></g>
    <g transform="translate(720,0)"><text class="txt rain r8"><tspan x="0" dy="14">4</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">ﾌ</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">C</tspan><tspan x="0" dy="16">ｵ</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">7</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">ﾖ</tspan><tspan x="0" dy="16">E</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">5</tspan><tspan x="0" dy="16">ｱ</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">A</tspan><tspan x="0" dy="16">3</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">ﾄ</tspan><tspan x="0" dy="16">8</tspan></text></g>
    <g transform="translate(805,0)"><text class="txt rain r9"><tspan x="0" dy="14">1</tspan><tspan x="0" dy="16">ﾒ</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">6</tspan><tspan x="0" dy="16">ｳ</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">9</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">ﾘ</tspan><tspan x="0" dy="16">D</tspan><tspan x="0" dy="16">2</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">ｿ</tspan><tspan x="0" dy="16">0</tspan><tspan x="0" dy="16">F</tspan><tspan x="0" dy="16">7</tspan><tspan x="0" dy="16">ﾊ</tspan><tspan x="0" dy="16">1</tspan><tspan x="0" dy="16">4</tspan><tspan x="0" dy="16">0</tspan></text></g>
  </g>

  <!-- title bar -->
  <path d="M1 13 A12 12 0 0 1 13 1 H837 A12 12 0 0 1 849 13 V37 H1 Z" fill="#111823"/>
  <line x1="1" y1="37" x2="849" y2="37" stroke="#00ff9c" stroke-opacity="0.15"/>
  <circle cx="24" cy="19" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="19" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="19" r="6" fill="#27c93f"/>
  <text class="txt dim" x="425" y="23" text-anchor="middle">root@saitarrun: ~/0x1337</text>

  <!-- terminal session -->
  <g clip-path="url(#c1)">
    <text class="txt" x="34" y="79"><tspan class="prompt">saitarrun@ghost:~$ </tspan><tspan class="cmd">whoami</tspan></text>
  </g>

  <g clip-path="url(#c2)">
    <text class="ghostR txt gA" x="34" y="126">SAI TARRUN PITTA</text>
    <text class="ghostC txt gB" x="34" y="126">SAI TARRUN PITTA</text>
    <text class="name txt" x="34" y="126">SAI TARRUN PITTA</text>
  </g>

  <g clip-path="url(#c3)">
    <text class="txt" x="34" y="163"><tspan class="prompt">saitarrun@ghost:~$ </tspan><tspan class="cmd">cat role.txt</tspan></text>
  </g>

  <g clip-path="url(#c4)">
    <text class="txt out" x="34" y="193">&gt; hacker &amp;&amp; software engineer</text>
  </g>

  <g clip-path="url(#c5)">
    <text class="txt" x="34" y="227"><tspan class="prompt">saitarrun@ghost:~$ </tspan></text>
  </g>
  <rect class="cursor" x="207" y="213" width="9" height="17" fill="#00ff9c"/>

  <!-- footer status -->
  <circle class="pulse" cx="38" cy="251" r="4" fill="#00ff9c"/>
  <text class="txt tiny" x="50" y="255">sys.online</text>
  <text class="txt tiny" x="816" y="255" text-anchor="end">mode: stealth  //  uptime: ∞</text>

  <!-- CRT overlay -->
  <g clip-path="url(#body)">
    <rect x="1" y="37" width="848" height="232" fill="url(#scanlines)"/>
    <rect class="band" x="1" y="0" width="848" height="70" fill="url(#bandGrad)"/>
  </g>
</svg>
