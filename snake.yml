name: generate-snake

on:
  schedule:
    - cron: "0 0 * * *"   # daily
  workflow_dispatch:        # manual trigger (run this once after pushing)
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: saitarrun
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%2300ff9c

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
